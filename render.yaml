# Render Blueprint — разворачивает бота + админ-панель одним сервисом.
# Free-план, без карты. Сервис засыпает после 15 мин без запросов —
# поэтому настраиваем внешний пинг (UptimeRobot) на путь /health (см. RENDER_DEPLOY.md).
services:
  - type: web
    name: academy-arabic-bot
    runtime: python
    plan: free
    region: frankfurt          # ближайший к Узбекистану бесплатный регион
    buildCommand: pip install -r requirements.txt
    startCommand: python run_all.py
    healthCheckPath: /health
    envVars:
      # Секреты — значения вводятся в дашборде Render (sync: false = не хранить в git).
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Несекретные — можно держать прямо здесь.
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_VISION_MODEL
        value: llama-3.2-11b-vision-preview
      - key: PYTHON_VERSION
        value: "3.12.7"
